# 배포 설정 — Agent 08이 참조합니다
# provider를 변경하여 배포 대상을 확장할 수 있습니다

provider: cafe24  # cafe24 | docker | vercel

staging:
  url: http://localhost:3000
  health_check:
    app: /
    api: /api/health
  timeout: 30

production:
  url: https://example.com
  health_check:
    app: /
    api: /api/health
  timeout: 60
  requires_approval: true

rollback:
  max_retries: 3
  escalate_after: 3
